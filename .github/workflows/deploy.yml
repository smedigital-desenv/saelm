# =============================================================================
# Deploy do site no GitHub Pages com retry automático.
# O backend do Pages desta org falha de forma intermitente com
# "Deployment failed, try again later" — este workflow tenta até 3 vezes.
#
# REQUISITO: em Settings > Pages > Source, escolher "GitHub Actions".
# =============================================================================
name: Publicar no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; um push novo cancela o anterior (evita "failed" falso)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d1.outputs.page_url || steps.d2.outputs.page_url || steps.d3.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Empacotar site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy (tentativa 1)
        id: d1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Aguardar 30s
        if: steps.d1.outcome == 'failure'
        run: sleep 30

      - name: Deploy (tentativa 2)
        id: d2
        if: steps.d1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Aguardar 60s
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 60

      - name: Deploy (tentativa 3)
        id: d3
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v4
